services:
  mongodb:
    image: mongo:7
    container_name: molyweb-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - molyweb-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: molyweb-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/molyweb
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - molyweb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    container_name: molyweb-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    hostname: frontend
    environment:
      - HOST=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - molyweb-network

volumes:
  mongo-data:

networks:
  molyweb-network:
    driver: bridge
